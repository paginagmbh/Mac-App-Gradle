buildscript {
    repositories {
        mavenLocal()
        mavenCentral()
        gradlePluginPortal()
    }
    dependencies {
        classpath 'com.gradleup.shadow:com.gradleup.shadow.gradle.plugin:8.3.9'
    }
}

plugins {
    id 'eclipse'
    id 'java-gradle-plugin'
    id 'com.gradle.plugin-publish' version '1.2.1'

    id 'de.paginagmbh.commons.gradle-release-tools' version '1.1.2'
}

dependencies {
    implementation 'com.gradleup.shadow:com.gradleup.shadow.gradle.plugin:8.3.9' // bundle all jars into one
}

group = "de.paginagmbh.commons"
version = "1.2.9"

javadoc {
    options.encoding = 'UTF-8'
}

compileJava {
    options.encoding = 'UTF-8'
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}

gradlePlugin {
    website = 'https://code.pagina.gmbh/parsx/mac-app-gradle'
    vcsUrl = 'https://code.pagina.gmbh/parsx/mac-app-gradle'

    plugins {
        myPlugins {
            id = 'de.paginagmbh.commons.mac-app-gradle'
            implementationClass = 'de.paginagmbh.commons.mac_app_gradle.GenerateMacAppPlugin'
            displayName = 'Mac App Bundler and Signer'
            description = 'Create a Mac App for java source, sign and notarize it.'
            tags.set(['macOS', 'mac', 'codesign', 'sign', 'notarize'])
        }
    }
}

def artifactory_url = "https://bintray.pagina.gmbh/artifactory"
publishing {
    repositories {
        maven {
            url = version.endsWith('SNAPSHOT') ? "${artifactory_url}/plugins-snapshot-local" : "${artifactory_url}/plugins-release-local"
            name = version.endsWith('SNAPSHOT') ? "PaginaArtifactoryLocalPluginsSnapshots" : "PaginaArtifactoryLocalPluginsReleased"
            credentials {
                username = System.getenv("ARTIFACTORY_USER")
                password = System.getenv("ARTIFACTORY_PASSWORD")
            }
        }
    }
}


updateVersionNumberInReadme {
    pluginId = "de.paginagmbh.commons.mac-app-gradle"
}
